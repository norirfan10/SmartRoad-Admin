<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartRoad Admin — Login</title>
  <link rel="stylesheet" href="style.css" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA3akQlH2taxlk1QspxIapL40MarzEroAA",
      authDomain: "smartroad-ac252.firebaseapp.com",
      projectId: "smartroad-ac252",
      storageBucket: "smartroad-ac252.firebasestorage.app",
      messagingSenderId: "146408848910",
      appId: "1:146408848910:web:f42852b785b3485da1865f",
      measurementId: "G-5R5V5V9CTL"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const form = document.getElementById("login-form");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const errorBox = document.getElementById("error-message");
    const submitBtn = document.getElementById("submit-btn");

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add("visible");
    }

    function hideError() {
      errorBox.textContent = "";
      errorBox.classList.remove("visible");
    }

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? "Signing in..." : "Sign In";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      hideError();
      setLoading(true);

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      try {
        const credential = await signInWithEmailAndPassword(auth, email, password);
        const uid = credential.user.uid;

        const userDocRef = doc(db, "users", uid);
        const userDocSnap = await getDoc(userDocRef);

        const isAdmin = userDocSnap.exists() && userDocSnap.data().isAdmin === true;

        if (isAdmin) {
          window.location.href = "dashboard.html";
        } else {
          await signOut(auth);
          showError("This account does not have admin access.");
          setLoading(false);
        }
      } catch (error) {
        console.error(error);
        showError("Invalid email or password. Please try again.");
        setLoading(false);
      }
    });
  </script>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 100 100" width="64" height="64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SmartRoad logo">
        <circle cx="50" cy="50" r="48" fill="#0D2340" />
        <path d="M50 20 L75 72 L25 72 Z" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" />
        <rect x="47" y="40" width="6" height="16" rx="3" fill="#FFFFFF" />
        <circle cx="50" cy="62" r="4" fill="#FFFFFF" />
      </svg>
    </div>
    <h1>SmartRoad Admin</h1>
    <p class="subtitle">Sign in with your administrator account</p>

    <div id="error-message" class="error-message"></div>

    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>
      <button type="submit" id="submit-btn" class="btn btn-block">Sign In</button>
    </form>
  </div>
</body>
</html>
