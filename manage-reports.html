<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartRoad Admin — Manage Reports</title>
  <link rel="stylesheet" href="style.css?v=3" />

  <script>
    window.__googleMapsReady = false;
    window.initGoogleMapsCallback = function () {
      window.__googleMapsReady = true;
      if (typeof window.__onGoogleMapsReady === "function") {
        window.__onGoogleMapsReady();
      }
    };
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCAxhCRK98jmFuF1bvTDx858_03Ep3O6f4&callback=initGoogleMapsCallback&loading=async" async defer></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      collection,
      getDocs,
      addDoc,
      updateDoc,
      deleteDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA3akQlH2taxlk1QspxIapL40MarzEroAA",
      authDomain: "smartroad-ac252.firebaseapp.com",
      projectId: "smartroad-ac252",
      storageBucket: "smartroad-ac252.firebasestorage.app",
      messagingSenderId: "146408848910",
      appId: "1:146408848910:web:f42852b785b3485da1865f",
      measurementId: "G-5R5V5V9CTL"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const STATUS_OPTIONS = ["New", "Under Investigation", "Resolved"];

    const signedInAsEl = document.getElementById("signed-in-as");
    const signOutBtn = document.getElementById("sign-out-btn");
    const tableBody = document.getElementById("reports-body");
    const emptyState = document.getElementById("reports-empty");
    const resultsCount = document.getElementById("results-count");

    const searchInput = document.getElementById("search-input");
    const hazardTypeFilter = document.getElementById("filter-hazard-type");
    const statusFilter = document.getElementById("filter-status");
    const dateFromInput = document.getElementById("filter-date-from");
    const dateToInput = document.getElementById("filter-date-to");
    const clearFiltersBtn = document.getElementById("clear-filters-btn");

    const addReportBtn = document.getElementById("add-report-btn");
    const addReportModal = document.getElementById("add-report-modal");
    const addReportForm = document.getElementById("add-report-form");
    const addReportCancelBtn = document.getElementById("add-report-cancel-btn");
    const addReportCloseBtn = document.getElementById("add-report-close-btn");
    const addReportError = document.getElementById("add-report-error");
    const addReportSubmitBtn = document.getElementById("add-report-submit-btn");

    const addLatitudeInput = document.getElementById("add-latitude");
    const addLongitudeInput = document.getElementById("add-longitude");
    const mapPickerEl = document.getElementById("add-report-map");

    const addPhotoFileInput = document.getElementById("add-photo-file");
    const photoUploadStatus = document.getElementById("photo-upload-status");
    const photoPreview = document.getElementById("photo-preview");
    const photoPreviewImg = document.getElementById("photo-preview-img");

    const MELAKA_CENTER = { lat: 2.1896, lng: 102.2501 };
    const CLOUDINARY_UPLOAD_URL = "https://api.cloudinary.com/v1_1/trw0gwr6/image/upload";
    const CLOUDINARY_UPLOAD_PRESET = "smartroad_hazards";

    let allReports = [];
    let map = null;
    let marker = null;
    let mapInitPending = false;
    let uploadedPhotoUrl = "";
    let photoUploadInProgress = false;

    function statusPillClass(status) {
      return "status-pill status-" + String(status).replace(/\s+/g, "-");
    }

    function statusOptionsHtml(selectedStatus) {
      return STATUS_OPTIONS.map(
        (status) => `<option value="${status}" ${status === selectedStatus ? "selected" : ""}>${status}</option>`
      ).join("");
    }

    function formatDate(timestamp) {
      if (!timestamp || typeof timestamp.toDate !== "function") return "—";
      const date = timestamp.toDate();
      return date.toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value ?? "";
      return div.innerHTML;
    }

    function getFilteredReports() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const hazardType = hazardTypeFilter.value;
      const status = statusFilter.value;
      const dateFrom = dateFromInput.value ? new Date(dateFromInput.value + "T00:00:00") : null;
      const dateTo = dateToInput.value ? new Date(dateToInput.value + "T23:59:59") : null;

      return allReports.filter((report) => {
        if (searchTerm) {
          const username = (report.username ?? "").toLowerCase();
          const description = (report.description ?? "").toLowerCase();
          if (!username.includes(searchTerm) && !description.includes(searchTerm)) {
            return false;
          }
        }

        if (hazardType && report.hazardType !== hazardType) return false;
        if (status && report.status !== status) return false;

        if (dateFrom || dateTo) {
          const reportDate = report.createdAt && report.createdAt.toDate ? report.createdAt.toDate() : null;
          if (!reportDate) return false;
          if (dateFrom && reportDate < dateFrom) return false;
          if (dateTo && reportDate > dateTo) return false;
        }

        return true;
      });
    }

    function renderTable() {
      const filtered = getFilteredReports();

      resultsCount.textContent = `Showing ${filtered.length} of ${allReports.length} reports`;
      tableBody.innerHTML = "";

      if (filtered.length === 0) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      for (const report of filtered) {
        const row = document.createElement("tr");
        row.dataset.id = report.id;
        row.innerHTML = `
          <td>${escapeHtml(report.username) || "—"}</td>
          <td>${escapeHtml(report.hazardType) || "—"}</td>
          <td class="description-cell" title="${escapeHtml(report.description)}">${escapeHtml(report.description) || "—"}</td>
          <td>${formatDate(report.createdAt)}</td>
          <td><span class="${statusPillClass(report.status)}">${escapeHtml(report.status) || "—"}</span></td>
          <td>
            <div class="row-actions">
              <a class="btn btn-sm btn-outline" href="report-details.html?id=${encodeURIComponent(report.id)}">View</a>
              <select class="status-select" data-id="${report.id}">
                ${statusOptionsHtml(report.status)}
              </select>
              <button class="btn btn-sm btn-danger-outline" data-action="delete" data-id="${report.id}">Delete</button>
            </div>
          </td>
        `;
        tableBody.appendChild(row);
      }
    }

    async function loadReports() {
      const reportsSnap = await getDocs(collection(db, "hazard_reports"));
      allReports = reportsSnap.docs.map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }));
      allReports.sort((a, b) => {
        const aTime = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
        const bTime = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
        return bTime - aTime;
      });
      renderTable();
    }

    tableBody.addEventListener("change", async (event) => {
      const select = event.target.closest(".status-select");
      if (!select) return;

      const reportId = select.dataset.id;
      const newStatus = select.value;

      select.disabled = true;
      try {
        await updateDoc(doc(db, "hazard_reports", reportId), { status: newStatus });
        const report = allReports.find((r) => r.id === reportId);
        if (report) report.status = newStatus;
        renderTable();
      } catch (error) {
        console.error(error);
        alert("Failed to update status. Please try again.");
        select.disabled = false;
      }
    });

    tableBody.addEventListener("click", async (event) => {
      const deleteBtn = event.target.closest('[data-action="delete"]');
      if (!deleteBtn) return;

      const reportId = deleteBtn.dataset.id;
      const confirmed = confirm("Delete this report? This action cannot be undone.");
      if (!confirmed) return;

      deleteBtn.disabled = true;
      try {
        await deleteDoc(doc(db, "hazard_reports", reportId));
        allReports = allReports.filter((r) => r.id !== reportId);
        renderTable();
      } catch (error) {
        console.error(error);
        alert("Failed to delete report. Please try again.");
        deleteBtn.disabled = false;
      }
    });

    [searchInput, hazardTypeFilter, statusFilter, dateFromInput, dateToInput].forEach((el) => {
      el.addEventListener("input", renderTable);
      el.addEventListener("change", renderTable);
    });

    clearFiltersBtn.addEventListener("click", () => {
      searchInput.value = "";
      hazardTypeFilter.value = "";
      statusFilter.value = "";
      dateFromInput.value = "";
      dateToInput.value = "";
      renderTable();
    });

    function placeMarker(latLng) {
      if (marker) {
        marker.setPosition(latLng);
      } else {
        marker = new google.maps.Marker({ position: latLng, map });
      }
      addLatitudeInput.value = latLng.lat().toFixed(6);
      addLongitudeInput.value = latLng.lng().toFixed(6);
    }

    function setupMap() {
      map = new google.maps.Map(mapPickerEl, {
        center: MELAKA_CENTER,
        zoom: 12
      });
      map.addListener("click", (event) => placeMarker(event.latLng));
    }

    function ensureMapInitialized() {
      if (map) {
        google.maps.event.trigger(map, "resize");
        map.setCenter(marker ? marker.getPosition() : MELAKA_CENTER);
        return;
      }
      if (window.__googleMapsReady) {
        setupMap();
      } else {
        mapInitPending = true;
      }
    }

    window.__onGoogleMapsReady = () => {
      if (mapInitPending) {
        setupMap();
        mapInitPending = false;
      }
    };

    function clearMapSelection() {
      if (marker) {
        marker.setMap(null);
        marker = null;
      }
      addLatitudeInput.value = "";
      addLongitudeInput.value = "";
    }

    function resetPhotoUpload() {
      addPhotoFileInput.value = "";
      uploadedPhotoUrl = "";
      photoUploadInProgress = false;
      photoUploadStatus.textContent = "";
      photoUploadStatus.classList.remove("error", "success");
      photoPreview.style.display = "none";
      photoPreviewImg.src = "";
    }

    addPhotoFileInput.addEventListener("change", async () => {
      const file = addPhotoFileInput.files[0];
      uploadedPhotoUrl = "";
      photoUploadStatus.classList.remove("error", "success");

      if (!file) {
        photoPreview.style.display = "none";
        photoUploadStatus.textContent = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        photoPreviewImg.src = reader.result;
        photoPreview.style.display = "block";
      };
      reader.readAsDataURL(file);

      photoUploadInProgress = true;
      photoUploadStatus.textContent = "Uploading…";

      try {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

        const response = await fetch(CLOUDINARY_UPLOAD_URL, {
          method: "POST",
          body: formData
        });

        if (!response.ok) throw new Error("Upload failed");

        const data = await response.json();
        if (!data.secure_url) throw new Error("Upload failed");

        uploadedPhotoUrl = data.secure_url;
        photoUploadStatus.textContent = "Photo uploaded.";
        photoUploadStatus.classList.add("success");
      } catch (error) {
        console.error(error);
        uploadedPhotoUrl = "";
        photoUploadStatus.textContent = "Failed to upload photo. Please try again or remove the selected file.";
        photoUploadStatus.classList.add("error");
      } finally {
        photoUploadInProgress = false;
      }
    });

    function openAddReportModal() {
      addReportForm.reset();
      document.getElementById("add-status").value = "New";
      addReportError.classList.remove("visible");
      clearMapSelection();
      resetPhotoUpload();
      addReportModal.classList.add("visible");
      requestAnimationFrame(ensureMapInitialized);
    }

    function closeAddReportModal() {
      addReportModal.classList.remove("visible");
    }

    addReportBtn.addEventListener("click", openAddReportModal);
    addReportCancelBtn.addEventListener("click", closeAddReportModal);
    addReportCloseBtn.addEventListener("click", closeAddReportModal);
    addReportModal.addEventListener("click", (event) => {
      if (event.target === addReportModal) closeAddReportModal();
    });

    addReportForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const hazardType = document.getElementById("add-hazard-type").value;
      const description = document.getElementById("add-description").value.trim();
      const latitudeRaw = addLatitudeInput.value;
      const longitudeRaw = addLongitudeInput.value;
      const status = document.getElementById("add-status").value;

      const latitude = parseFloat(latitudeRaw);
      const longitude = parseFloat(longitudeRaw);

      if (!hazardType || latitudeRaw === "" || longitudeRaw === "" || Number.isNaN(latitude) || Number.isNaN(longitude)) {
        addReportError.textContent = "Hazard type is required, and a location must be selected on the map.";
        addReportError.classList.add("visible");
        return;
      }

      if (addPhotoFileInput.files.length > 0 && !uploadedPhotoUrl) {
        addReportError.textContent = photoUploadInProgress
          ? "Please wait for the photo to finish uploading."
          : "Photo upload failed. Please retry or remove the selected file before submitting.";
        addReportError.classList.add("visible");
        return;
      }

      addReportError.classList.remove("visible");
      addReportSubmitBtn.disabled = true;

      try {
        await addDoc(collection(db, "hazard_reports"), {
          userId: auth.currentUser.uid,
          username: "Admin",
          hazardType,
          description,
          photoUrl: uploadedPhotoUrl,
          latitude,
          longitude,
          status,
          userAgent: "Admin Panel",
          createdAt: serverTimestamp()
        });

        closeAddReportModal();
        await loadReports();
      } catch (error) {
        console.error(error);
        addReportError.textContent = "Failed to add report. Please try again.";
        addReportError.classList.add("visible");
      } finally {
        addReportSubmitBtn.disabled = false;
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      const userDocSnap = await getDoc(doc(db, "users", user.uid));
      const isAdmin = userDocSnap.exists() && userDocSnap.data().isAdmin === true;

      if (!isAdmin) {
        await signOut(auth);
        window.location.href = "index.html";
        return;
      }

      signedInAsEl.textContent = user.email;

      try {
        await loadReports();
      } catch (error) {
        console.error(error);
        emptyState.textContent = "Failed to load reports.";
        emptyState.style.display = "block";
      }
    });

    signOutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });
  </script>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 100 100" width="32" height="32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SmartRoad logo">
        <circle cx="50" cy="50" r="48" fill="#0D2340" />
        <path d="M50 20 L75 72 L25 72 Z" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" />
        <rect x="47" y="40" width="6" height="16" rx="3" fill="#FFFFFF" />
        <circle cx="50" cy="62" r="4" fill="#FFFFFF" />
      </svg>
      <span>SmartRoad Admin</span>
    </div>
    <nav class="app-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="manage-reports.html" class="active">Manage Reports</a>
      <span class="signed-in-as" id="signed-in-as"></span>
      <button class="btn-link" id="sign-out-btn">Sign Out</button>
    </nav>
  </header>

  <main class="app-main">
    <div class="page-header">
      <h1>Manage Reports</h1>
      <button type="button" class="btn" id="add-report-btn">+ Add Report</button>
    </div>

    <div class="panel">
      <div class="filters-bar">
        <div class="filter-field">
          <label for="search-input">Search</label>
          <input type="text" id="search-input" placeholder="Username or description..." />
        </div>

        <div class="filter-field">
          <label for="filter-hazard-type">Hazard Type</label>
          <select id="filter-hazard-type">
            <option value="">All Types</option>
            <option value="Pothole">Pothole</option>
            <option value="Flood">Flood</option>
            <option value="Accident">Accident</option>
            <option value="Fallen Tree">Fallen Tree</option>
            <option value="Traffic Light">Traffic Light</option>
          </select>
        </div>

        <div class="filter-field">
          <label for="filter-status">Status</label>
          <select id="filter-status">
            <option value="">All Statuses</option>
            <option value="New">New</option>
            <option value="Under Investigation">Under Investigation</option>
            <option value="Resolved">Resolved</option>
          </select>
        </div>

        <div class="filter-field">
          <label for="filter-date-from">Date Range</label>
          <div class="date-range">
            <input type="date" id="filter-date-from" />
            <span>to</span>
            <input type="date" id="filter-date-to" />
          </div>
        </div>

        <button type="button" class="btn-clear" id="clear-filters-btn">Clear filters</button>
      </div>

      <div class="results-count" id="results-count">Loading reports…</div>

      <table>
        <thead>
          <tr>
            <th>Username</th>
            <th>Hazard Type</th>
            <th>Description</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="reports-body"></tbody>
      </table>
      <div class="empty-state" id="reports-empty" style="display: none;">No reports found.</div>
    </div>
  </main>

  <div class="modal-overlay" id="add-report-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Add Report</h2>
        <button type="button" class="modal-close" id="add-report-close-btn" aria-label="Close">&times;</button>
      </div>
      <form id="add-report-form">
        <div class="modal-body">
          <div class="error-message" id="add-report-error"></div>

          <div class="field">
            <label for="add-hazard-type">Hazard Type</label>
            <select id="add-hazard-type" required>
              <option value="">Select hazard type…</option>
              <option value="Pothole">Pothole</option>
              <option value="Flood">Flood</option>
              <option value="Accident">Accident</option>
              <option value="Fallen Tree">Fallen Tree</option>
              <option value="Traffic Light">Traffic Light</option>
            </select>
          </div>

          <div class="field">
            <label for="add-description">Description</label>
            <textarea id="add-description" rows="3" placeholder="Describe the hazard..."></textarea>
          </div>

          <div class="field">
            <label>Location <span class="hint-inline">(click the map to place a marker)</span></label>
            <div id="add-report-map" class="map-picker"></div>
            <div class="form-row" style="margin-top: 10px;">
              <div class="field">
                <label for="add-latitude">Latitude</label>
                <input type="text" id="add-latitude" readonly placeholder="Click map…" />
              </div>
              <div class="field">
                <label for="add-longitude">Longitude</label>
                <input type="text" id="add-longitude" readonly placeholder="Click map…" />
              </div>
            </div>
          </div>

          <div class="field">
            <label for="add-status">Status</label>
            <select id="add-status">
              <option value="New">New</option>
              <option value="Under Investigation">Under Investigation</option>
              <option value="Resolved">Resolved</option>
            </select>
          </div>

          <div class="field">
            <label for="add-photo-file">Photo (optional)</label>
            <input type="file" id="add-photo-file" accept="image/*" />
            <div class="photo-upload-status" id="photo-upload-status"></div>
            <div class="photo-preview" id="photo-preview" style="display: none;">
              <img id="photo-preview-img" alt="Selected photo preview" />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" id="add-report-cancel-btn">Cancel</button>
          <button type="submit" class="btn" id="add-report-submit-btn">Add Report</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
